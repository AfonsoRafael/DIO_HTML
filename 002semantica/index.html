<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Exemplo Semântico</title>
</head>
<body>

    <!-- HEADER: Define o cabeçalho do site, contendo logo e navegação -->
    <header>
        <h1>Meu Site Incrível</h1>
        <!-- NAV: Define blocos de links de navegação, como menus -->
        <nav>
            <ul>
                <li><a href="#">Home</a></li>
                <li><a href="#">Blog</a></li>
            </ul>
        </nav>
    </header>

    <!-- MAIN: Define o conteúdo principal e único da página -->
    <main>
        <!-- ARTICLE: Conteúdo independente, como um post ou notícia -->
        <article>
            <h2>Título do Artigo</h2>
            <p>Conteúdo relevante do artigo.</p>
        </article>

        <!-- SECTION: Agrupa conteúdos relacionados, como seções de um artigo -->
        <section>
            <h2>Outras Notícias</h2>
            <p>Conteúdo da seção.</p>
        </section>

        <!-- ASIDE: Conteúdo tangencial, relacionado mas separado (sidebar) -->
        <aside>
            <h3>Sobre o Autor</h3>
            <p>Conteúdo complementar ou biografia.</p>
        </aside>
    </main>

    <!-- FOOTER: Rodapé da página ou seção, com copyright ou links -->
    <footer>
        <p>&copy; 2026 Meu Site - Todos os direitos reservados.</p>
    </footer>

</body>
</html>
